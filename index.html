<!DOCTYPE html>
<!--
  MA-4513 — Minimal Custom Web Receiver (Milestone 1), modeled on the sibling Harna app's
  working receiver. Plays whatever HLS the sender loads via RemoteMediaClient.

  KEY: useShakaForHls = true — play HLS through the Shaka player (robust HLS, reads the manifest
  itself) instead of the default Media Player Library. This is what makes Harna's custom receiver
  play HLS reliably where the Default Media Receiver does not.

  Deploy: host this single file on GitHub Pages (https://<org>.github.io/<repo>/), register that
  URL as a Custom Receiver in the Cast Developer Console, then put the resulting application id
  into app/src/main/res/values/cast.xml (cast_receiver_app_id).

  Custom overlays / messages (the Reboot protocol) come in later milestones — the namespace channel
  is opened here but only logs for now.
-->
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MadMuscles Reboot Receiver</title>
    <style>
        html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
        cast-media-player { --background-color: #000; width: 100%; height: 100%; }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <!-- Cast Debug Logger (lets us read receiver-side errors via remote DevTools) -->
    <script src="//www.gstatic.com/cast/sdk/libs/devtools/debug_layer/caf_receiver_logger.js"></script>
</head>
<body>
    <cast-media-player></cast-media-player>
    <script>
        const NAMESPACE = 'urn:x-cast:com.amomedia.musclemate.reboot';

        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        const castDebugLogger = cast.debug.CastDebugLogger.getInstance();
        context.setLoggerLevel(cast.framework.LoggerLevel.DEBUG);

        // Reboot overlay protocol channel. M1: log only — handlers (overlays, audio switch,
        // QUEUE_NEXT/PREV routing) arrive in later milestones.
        context.addCustomMessageListener(NAMESPACE, (event) => {
            castDebugLogger.info('Reboot', 'custom msg: ' + JSON.stringify(event.data));
        });

        playerManager.addEventListener(cast.framework.events.EventType.PLAYER_LOAD_COMPLETE, () => {
            castDebugLogger.info('Reboot', 'PLAYER_LOAD_COMPLETE');
        });
        playerManager.addEventListener(cast.framework.events.EventType.ERROR, (event) => {
            castDebugLogger.error('Reboot', 'player error: ' + JSON.stringify(event));
        });

        const options = new cast.framework.CastReceiverOptions();
        options.useShakaForHls = true; // robust HLS — see header note
        context.start(options);
    </script>
</body>
</html>
